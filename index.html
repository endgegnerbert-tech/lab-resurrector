<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>flabs — physics playground</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- LAUNCHPAD VIEW -->
    <div id="view-launchpad" class="view active">
      <header id="launchpad-header">
        <div class="brand">
          <h1>flabs</h1>
          <span class="tagline">physics, but make it fun</span>
        </div>
        <div class="header-actions">
          <button id="btn-api-key" class="btn-ghost" title="Enter API key">🔑 Key</button>
          <button id="btn-new-space" class="btn-primary">+ New Lab</button>
        </div>
      </header>

      <main id="card-grid"></main>

      <div id="empty-state" class="hidden">
        <p>No labs yet</p>
        <p class="sub">Hit <strong>+ New Lab</strong> to create one</p>
      </div>
    </div>

    <!-- SPACE VIEW -->
    <div id="view-space" class="view">
      <header id="space-header">
        <button id="btn-back" class="btn-ghost">← Back</button>
        <div class="space-title-group">
          <h2 id="space-title"></h2>
          <span id="space-meta" class="meta"></span>
        </div>
        <span id="api-key-status" class="api-status" title="API key status">🔒</span>
        <button id="btn-delete-space" class="btn-danger-outline" title="Delete lab">x</button>
      </header>

      <div id="space-layout">
        <div id="space-canvas-area">
          <iframe id="space-frame" title="lab iframe"></iframe>
        </div>

        <div id="sidebar-resizer" aria-hidden="true" title="Drag to resize sidebar"></div>

        <aside id="space-sidebar">
          <!-- Controls -->
          <section id="param-section">
            <div class="section-header">
              <span>Controls</span>
              <div class="control-buttons">
                <button id="btn-play" title="Play/Pause" class="btn-icon">&#9646;&#9646;</button>
                <button id="btn-reset" title="Reset" class="btn-icon">&#x21BA;</button>
              </div>
            </div>
            <div id="param-panel"></div>
          </section>

          <!-- Formula -->
          <section id="formula-section" class="collapsible collapsed">
            <button class="section-toggle" data-target="formula-body">Formula</button>
            <div id="formula-body" class="section-body">
              <div class="formula-display">
                <div class="formula-box">—</div>
                <div class="formula-vars"></div>
              </div>
              <div class="computed-result">
                <span class="result-label">Expected:</span>
                <span class="result-value">—</span>
              </div>
            </div>
          </section>

          <!-- Data -->
          <section id="data-section" class="collapsible">
            <button class="section-toggle" data-target="data-body">Data</button>
            <div id="data-body" class="section-body">
              <div id="live-values"></div>
              <div id="data-actions">
                <button id="btn-export-csv" class="btn-sm">Export CSV</button>
              </div>
            </div>
          </section>

          <!-- Chat -->
          <section id="chat-section">
            <div id="chat-messages"></div>
            <div id="chat-input-area">
              <textarea id="chat-input" rows="1" placeholder="Ask the lab assistant..."></textarea>
              <button id="chat-send" class="btn-primary btn-sm">Send</button>
            </div>
          </section>
        </aside>
      </div>
    </div>
  </div>

  <script src="js/ws/client.js"></script>
  <script src="js/chat/panel.js"></script>
  <script src="js/experiment/api.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
